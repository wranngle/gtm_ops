version: 2
updates:
  # GitHub Actions used by .github/workflows/*.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5

  # npm / Bun deps in the root package.json (Express, vitest, playwright,
  # @anthropic-ai/sdk, ajv, etc.). Bun reads the same package.json so this
  # covers the whole repo's JS surface.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
    # Group runtime + dev deps so the PR list stays readable. Major bumps
    # remain individual PRs so reviewers can decide them deliberately.
    groups:
      runtime:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev:
        dependency-type: "development"
        update-types: ["minor", "patch"]
