name: test

permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    name: static checks
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7  # v1
        with:
          bun-version: '1.3.13'
      - name: Validate knowledge base
        run: bash scripts/validate-knowledge-base.sh
      - name: Lint layered architecture
        run: bash scripts/lint-layered-architecture.sh
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit:
    name: unit (vitest)
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7  # v1
        with:
          bun-version: '1.3.13'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Run vitest
        run: bun run test:run

  console-e2e:
    name: console e2e (playwright)
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7  # v1
        with:
          bun-version: '1.3.13'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium
      - name: Run console e2e suite
        run: bun run test:console
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: playwright-console-report
          path: playwright-console-report/
          retention-days: 14

  pdf-e2e-collect:
    name: pdf e2e (collect-only)
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
    # Lightweight guard — full PDF e2e tests require pre-generated reports
    # under output/ which CI can't produce without LLM API secrets. This
    # job runs `playwright test --list` to verify the 326 PDF e2e tests
    # still COLLECT cleanly (catches the kind of module-load ENOENT bug
    # that tick 36 fixed) without trying to execute them.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7  # v1
        with:
          bun-version: '1.3.13'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify PDF e2e suite collects
        run: bun x playwright test --list
        env:
          PDF_E2E_NO_SERVER: '1'
