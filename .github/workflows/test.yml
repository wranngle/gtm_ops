name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    name: static checks
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.13'
      - name: Validate knowledge base
        run: bash scripts/validate-knowledge-base.sh
      - name: Lint layered architecture
        run: bash scripts/lint-layered-architecture.sh
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit:
    name: unit (vitest)
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.13'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Run vitest
        run: bun run test:run

  console-e2e:
    name: console e2e (playwright)
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.13'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium
      - name: Run console e2e suite
        run: bun run test:console
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-console-report
          path: playwright-console-report/
          retention-days: 14

  pdf-e2e-collect:
    name: pdf e2e (collect-only)
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    # Lightweight guard — full PDF e2e tests require pre-generated reports
    # under output/ which CI can't produce without LLM API secrets. This
    # job runs `playwright test --list` to verify the 326 PDF e2e tests
    # still COLLECT cleanly (catches the kind of module-load ENOENT bug
    # that tick 36 fixed) without trying to execute them.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.13'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify PDF e2e suite collects
        run: bun x playwright test --list
        env:
          PDF_E2E_NO_SERVER: '1'
