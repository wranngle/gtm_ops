name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: shellcheck
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=( **/*.sh )
          [[ ${#files[@]} -eq 0 ]] && { echo "no shell files — skipping"; exit 0; }
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -S warning "${files[@]}"

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"
      - name: yamllint
        run: |
          pip install --quiet --require-hashes -r .github/requirements-ci.txt
          yamllint -c .yamllint.yml .

  # The `test` context is REQUIRED by the dotfiles universal branch gate
  # (repo ruleset), so this job must exist and report. A previous
  # detect-and-test job self-skipped whenever test.yml existed — a
  # permanently green no-op that satisfied the gate with false signal.
  # It now runs the real unit suite, so the required context is true signal;
  # test.yml remains the full pipeline (static / unit / console-e2e).
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: 'true'
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: '1.3.14'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install PyMuPDF renderer dependency
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install -r requirements.txt
      - name: unit tests
        run: bun run test:run
