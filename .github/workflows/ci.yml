name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: shellcheck
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=( **/*.sh )
          [[ ${#files[@]} -eq 0 ]] && { echo "no shell files — skipping"; exit 0; }
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -S warning "${files[@]}"

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"
      - name: yamllint
        run: |
          pip install --quiet yamllint
          yamllint -c .yamllint.yml .

  # NOTE: no generic test job here on purpose — .github/workflows/test.yml is
  # the dedicated test pipeline (static / unit / console-e2e). A previous
  # detect-and-test job self-skipped whenever test.yml existed, i.e. it was a
  # permanently green no-op; removed rather than left as false signal.
