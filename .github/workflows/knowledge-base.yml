name: knowledge-base

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository knowledge base
        run: scripts/validate-knowledge-base.sh
      - name: Lint layered domain architecture
        run: scripts/lint-layered-architecture.sh
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run ops-console domain tests
        run: |
          pip install pytest
          pytest apps/ops-console/tests/ -q
      - name: Run doc gardener (non-blocking)
        run: scripts/gardener.sh || true
      - name: Validate Symphony workflow
        run: scripts/symphony.sh validate
      - name: Render Symphony dry run
        run: scripts/symphony.sh once --dry-run
