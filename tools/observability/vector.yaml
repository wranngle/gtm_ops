# Vector configuration for the local Symphony / agent-evals / ops-console
# stack. Reads ECS-jsonl from the repo's runtime log files and OTLP HTTP
# from apps, then fans out to the Victoria* backends.
#
# Diagram leg coverage (image #2):
#   APP --(file or OTLP)--> Vector --> Victoria{Logs,Metrics,Traces}
#
# The OTLP source produces three keyed sub-outputs: `.logs`, `.metrics`,
# `.traces`. Each must have at least one consumer or Vector logs a WARN.
# We currently consume all three; traces are forwarded to VictoriaTraces
# via its OTLP HTTP intake at `/insert/opentelemetry/v1/traces`.

sources:
  symphony_logs:
    type: file
    include:
      - /repo/.symphony/logs/*.jsonl
    read_from: end

  agent_evals_logs:
    type: file
    include:
      - /repo/packages/agent-evals/.logs/*.jsonl
    read_from: end

  otlp:
    type: opentelemetry
    grpc:
      address: 0.0.0.0:4317
    http:
      address: 0.0.0.0:4318
      keepalive:
        max_connection_age_jitter_factor: 0.1

transforms:
  parse_symphony_jsonl:
    type: remap
    inputs:
      - symphony_logs
      - agent_evals_logs
    source: |
      # The file source surfaces the raw line under `.message`. When the
      # line is JSON we promote its keys to the top of the event so that
      # downstream sinks see structured fields (service.name, log.level,
      # event.action, issue.identifier, ...). When the line is plain
      # text we leave `.message` as-is so it still flows through to
      # VictoriaLogs as `_msg`.
      raw_message = .message
      parsed, parse_err = parse_json(raw_message)
      if parse_err == null && is_object(parsed) {
        parsed_obj = object!(parsed)
        . = merge(., parsed_obj)
      }
      # VictoriaLogs requires `_msg` to be set. ECS uses `message`; mirror
      # it across so LogsQL freetext queries (`_msg:"..."`) work without
      # the operator having to know about the rename.
      if exists(.message) {
        ._msg = .message
      } else {
        ._msg = raw_message
      }
      .source = "vector-file"

sinks:
  victorialogs_logs:
    type: elasticsearch
    inputs:
      - parse_symphony_jsonl
      - otlp.logs
    endpoints: ["http://victorialogs:9428/insert/elasticsearch/"]
    api_version: v8
    mode: bulk
    # VictoriaLogs answers ES bulk inserts at `/insert/elasticsearch/_bulk`
    # but does not implement Vector's full ES healthcheck path, so the
    # default healthcheck flaps with HTTP 400. The data path itself works
    # — disable the probe so the sink stays green.
    healthcheck:
      enabled: false

  victoriametrics_metrics:
    type: prometheus_remote_write
    inputs:
      - otlp.metrics
    endpoint: http://victoriametrics:8428/api/v1/write
    # VictoriaMetrics returns HTTP 204 to the remote-write probe Vector
    # sends, which Vector treats as "unexpected" and surfaces as ERROR.
    # The data path itself is fine — disable the probe.
    healthcheck:
      enabled: false

  victoriatraces_traces:
    # VictoriaTraces speaks the OTLP HTTP traces protocol natively. Vector
    # 0.55 doesn't ship a dedicated `victoria_traces` sink, but `http`
    # forwarding the encoded OTLP bytes works as long as the OTLP source
    # output is wired in. See:
    #   https://docs.victoriametrics.com/victoriatraces/data-ingestion/
    type: http
    inputs:
      - otlp.traces
    uri: http://victoriatraces:10428/insert/opentelemetry/v1/traces
    method: post
    encoding:
      codec: json
    framing:
      method: newline_delimited
    healthcheck:
      enabled: false
