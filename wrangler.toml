# Cloudflare Pages config for the gtm_ops full-stack deploy.
#
# The static UI at apps/ops-console/ ships as before; in addition, every
# /api/* request is intercepted by a Pages Function under functions/api/*
# before the static fall-through. Functions read from D1 first and fall
# back to the bundled fixtures (the same JSON used by the DEMO_MODE shim)
# when D1 is empty or unbound — see docs/cf-fullstack-feasibility.md
# "Fallback model".
#
# Operator setup (one-time, all interactive — see scripts/migrate-d1.sh):
#   1) `wrangler login`
#   2) `wrangler pages project create gtm-ops --production-branch main`
#   3) `wrangler d1 create presales-d1`         (paste returned id below)
#   4) `wrangler kv:namespace create TEMPLATES` (paste returned id below)
#   5) `wrangler pages secret put GEMINI_API_KEY --project-name=gtm-ops`
#   6) `wrangler pages secret put N8N_WEBHOOK_SECRET --project-name=gtm-ops`
#   7) `bash scripts/migrate-d1.sh`             (loads config/seed_presales.sql)
#   8) `bun run deploy:preview`                  (preview branch, NOT main)

name = "gtm-ops"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "apps/ops-console"

# Bindings (D1 / KV / Browser Rendering) are intentionally NOT declared in
# this checked-in wrangler.toml — Cloudflare's deploy validator rejects
# placeholder/zero ids. The operator wires bindings via the Cloudflare
# dashboard (Pages → gtm-ops → Settings → Functions → Bindings) AFTER
# running the operator-action steps in docs/cf-fullstack-feasibility.md:
#
#   wrangler d1 create presales-d1               # → bind as DB on the project
#   wrangler kv namespace create TEMPLATES       # → bind as TEMPLATES
#   (Browser Rendering: enable on the project + bind as BROWSER)
#
# Every ported Pages Function under functions/api/ detects when DB is
# undefined (or bound but empty / throws) and serves the bundled fixture
# JSON from apps/ops-console/fixtures/, so deploys succeed and the UI
# stays functional throughout the migration.
