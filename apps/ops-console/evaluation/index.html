<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evals Redirect // Wranngle</title>
  <link rel="canonical" href="/console/?route=evals">
  <meta http-equiv="refresh" content="0; url=/console/?route=evals">
  <meta name="robots" content="noindex">
  <!-- Brand assets — even on a redirect page, browsers can fetch favicon
       and fonts before the refresh fires; the public-assets/font-fallback
       test suites enforce these invariants on every HTML entrypoint. -->
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    (function () {
      var target = window.location.protocol === 'file:'
        ? '../console/?route=evals'
        : '/console/?route=evals';
      window.location.replace(target);
    })();
  </script>
  <style>
    :root {
      --night-950: #12111a;
      --sand-50: #fcfaf5;
      --sunset-500: #ff5f00;
      --text-muted: #aaa4b8;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--night-950);
      color: var(--sand-50);
      font: 16px/1.5 Inter, system-ui, sans-serif;
    }

    main {
      width: min(520px, calc(100vw - 32px));
      border-left: 4px solid var(--sunset-500);
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 4px 8px 8px 4px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.2;
    }

    p { margin: 0; color: var(--text-muted); }

    a {
      color: var(--sunset-500);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main aria-labelledby="bridge-title">
    <h1 id="bridge-title">Opening the native Evals console</h1>
    <p>This compatibility route now hands off to <a href="/console/?route=evals">/console/?route=evals</a>.</p>
  </main>
</body>
</html>
