<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluation Dashboard // Wranngle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../tokens/tokens.css">

    <!-- DEMO_MODE: file:// or window.DEMO_MODE = true → fixtures served from ../fixtures/ -->
    <script>
      (function () {
        var DEMO_MODE = (window.location.protocol === 'file:') || window.DEMO_MODE === true;
        window.DEMO_MODE = DEMO_MODE;
        if (!DEMO_MODE) return;
        var nativeFetch = window.fetch.bind(window);
        window.fetch = function (input, init) {
          var url = typeof input === 'string' ? input : (input && input.url) || '';
          var method = ((init && init.method) || 'GET').toUpperCase();
          if (url.indexOf('/api') === -1) return nativeFetch(input, init);
          if (method !== 'GET' && method !== 'HEAD') {
            return Promise.resolve(new Response(JSON.stringify({ ok: true, demo: true }), {
              status: 200, headers: { 'Content-Type': 'application/json' }
            }));
          }
          var u = url.replace(/^https?:\/\/[^/]+/, '').split('?')[0];
          if (!u.indexOf('/api')) u = u.slice(4);
          u = u.replace(/\/\d+(\/|$)/g, '/default$1');
          return nativeFetch('../fixtures' + u + '.json').then(function (r) {
            if (r.ok) return r;
            return new Response('[]', { status: 200, headers: { 'Content-Type': 'application/json' } });
          }).catch(function () {
            return new Response('[]', { status: 200, headers: { 'Content-Type': 'application/json' } });
          });
        };
      })();
    </script>

    <style>
        :root {
            --violet-500: #cf3c69;
            --sunset-500: #ff5f00; --sunset-600: #ef4b00;
            --sand-50: #fcfaf5; --sand-200: #ebdfc8;
            --night-800: #393444; --night-900: #201e28; --night-950: #12111a;
            --color-healthy: #5D8C61;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--night-950);
            color: #e0dce8;
            min-height: 100vh;
            padding: 24px;
        }
        h1, h2, h3 { font-family: var(--font-display); }
        a { color: var(--sunset-500); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 32px; padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header .back { font-size: 13px; color: #847d9a; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }
        .stat-card {
            background: var(--night-900);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 20px;
        }
        .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #847d9a; margin-bottom: 8px; }
        .stat-card .value { font-family: var(--font-mono); font-size: 28px; font-weight: 700; }
        .stat-card .value.good { color: var(--color-healthy); }
        .stat-card .value.warn { color: #e8a735; }
        .stat-card .value.bad { color: var(--violet-500); }

        .section { margin-bottom: 32px; }
        .section h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #b5afc4; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px 12px; color: #847d9a; font-weight: 500;
             border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .mono { font-family: var(--font-mono); font-size: 12px; }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 9999px;
            font-size: 11px; font-weight: 500;
        }
        .badge.completed { background: rgba(93,140,97,0.15); color: var(--color-healthy); }
        .badge.failed { background: rgba(207,60,105,0.15); color: var(--violet-500); }
        .badge.running { background: rgba(232,167,53,0.15); color: #e8a735; }
        .badge.holdout { background: rgba(255,95,0,0.15); color: var(--sunset-500); }

        .score-bar {
            display: inline-block; height: 6px; border-radius: 3px;
            background: rgba(255,255,255,0.06); width: 80px; vertical-align: middle;
        }
        .score-bar .fill { height: 100%; border-radius: 3px; }

        .flaw-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .flaw-bar .bar { height: 14px; border-radius: 3px; background: var(--violet-500); min-width: 2px; }
        .flaw-bar .flaw-label { font-size: 12px; color: #b5afc4; min-width: 180px; }
        .flaw-bar .flaw-count { font-family: var(--font-mono); font-size: 12px; color: #847d9a; }

        .detail-panel {
            display: none; position: fixed; top: 0; right: 0; width: 480px; height: 100vh;
            background: var(--night-900); border-left: 1px solid rgba(255,255,255,0.08);
            padding: 24px; overflow-y: auto; z-index: 100;
        }
        .detail-panel.open { display: block; }
        .detail-panel h3 { margin-bottom: 16px; }
        .detail-panel .close-btn { cursor: pointer; float: right; color: #847d9a; font-size: 18px; }
        .detail-panel pre {
            background: var(--night-950); border-radius: 8px; padding: 12px;
            font-family: var(--font-mono); font-size: 11px; overflow-x: auto;
            max-height: 400px; overflow-y: auto; color: #b5afc4;
        }

        .filter-bar {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .filter-bar select, .filter-bar input {
            background: var(--night-800); border: 1px solid rgba(255,255,255,0.1);
            color: #e0dce8; padding: 6px 10px; border-radius: 6px; font-size: 12px;
            font-family: var(--font-body);
        }
        .empty { color: #847d9a; font-style: italic; padding: 24px; text-align: center; }
        .trend { font-size: 11px; margin-top: 4px; }
        .trend.up { color: var(--color-healthy); }
        .trend.down { color: var(--violet-500); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Evaluation Dashboard</h1>
        <a class="back" href="/">&#8592; Back to Generator</a>
    </div>

    <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="label">Loading...</div><div class="value">--</div></div>
    </div>

    <div class="section">
        <h2>Flaw Distribution</h2>
        <div id="flaw-chart"><div class="empty">No evaluation data yet</div></div>
    </div>

    <div class="section">
        <h2>Evaluation Runs</h2>
        <div class="filter-bar">
            <select id="filter-status">
                <option value="">All statuses</option>
                <option value="completed">Completed</option>
                <option value="failed">Failed</option>
            </select>
            <select id="filter-version">
                <option value="">All versions</option>
            </select>
            <input type="search" id="filter-search" placeholder="Search case study...">
        </div>
        <table>
            <thead><tr>
                <th>ID</th><th>Case Study</th><th>Status</th><th>Score</th><th>Flaws</th><th>Version</th><th>Date</th>
            </tr></thead>
            <tbody id="runs-table"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Case Study Corpus</h2>
        <table>
            <thead><tr>
                <th>ID</th><th>Industry</th><th>Company Type</th><th>Tier</th><th>Agent Type</th><th>Holdout</th><th>Quality</th>
            </tr></thead>
            <tbody id="cases-table"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
        </table>
    </div>

    <div class="detail-panel" id="detail-panel">
        <span class="close-btn" onclick="closeDetail()">&times;</span>
        <h3 id="detail-title">Run Detail</h3>
        <div id="detail-content"></div>
    </div>

    <script>
        const API = '';

        async function fetchJSON(url) {
            const r = await fetch(API + url);
            if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
            return r.json();
        }

        function scoreColor(score) {
            if (score == null) return '';
            if (score >= 0.7) return 'good';
            if (score >= 0.4) return 'warn';
            return 'bad';
        }

        function renderScoreBar(score) {
            if (score == null) return '<span class="mono" style="color:#847d9a">--</span>';
            const pct = Math.round(score * 100);
            const color = score >= 0.7 ? 'var(--color-healthy)' : score >= 0.4 ? '#e8a735' : 'var(--violet-500)';
            return `<span class="score-bar"><span class="fill" style="width:${pct}%;background:${color}"></span></span> <span class="mono">${pct}%</span>`;
        }

        let allRuns = [];

        async function loadStats() {
            try {
                const data = await fetchJSON('/api/eval/stats');
                const c = data.corpus || {};
                const e = data.evaluations || {};
                document.getElementById('stats-grid').innerHTML = `
                    <div class="stat-card">
                        <div class="label">Corpus Size</div>
                        <div class="value">${c.total ?? 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Holdout Cases</div>
                        <div class="value">${c.holdout ?? 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Eval Runs</div>
                        <div class="value">${e.total ?? 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Mean Score</div>
                        <div class="value ${scoreColor(e.mean_score)}">${e.mean_score != null ? Math.round(e.mean_score * 100) + '%' : '--'}</div>
                        ${e.latest_score != null ? `<div class="trend">Latest: ${Math.round(e.latest_score * 100)}%</div>` : ''}
                    </div>
                    <div class="stat-card">
                        <div class="label">Best Score</div>
                        <div class="value good">${e.best_score != null ? Math.round(e.best_score * 100) + '%' : '--'}</div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('stats-grid').innerHTML = `<div class="stat-card"><div class="label">Error</div><div class="value bad">${err.message}</div></div>`;
            }
        }

        async function loadRuns() {
            try {
                allRuns = await fetchJSON('/api/eval/runs?limit=200');
                const versions = [...new Set(allRuns.map(r => r.pipeline_version).filter(Boolean))];
                const sel = document.getElementById('filter-version');
                versions.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; sel.appendChild(o); });
                renderRuns(allRuns);
            } catch (err) {
                document.getElementById('runs-table').innerHTML = `<tr><td colspan="7" class="empty">${err.message}</td></tr>`;
            }
        }

        function renderRuns(runs) {
            if (!runs.length) {
                document.getElementById('runs-table').innerHTML = '<tr><td colspan="7" class="empty">No evaluation runs yet. Run <code>npm run eval:quick</code> to generate data.</td></tr>';
                return;
            }
            document.getElementById('runs-table').innerHTML = runs.map(r => `
                <tr style="cursor:pointer" onclick="showDetail(${r.id})">
                    <td class="mono">${r.id}</td>
                    <td>${r.case_study_id || '--'}</td>
                    <td><span class="badge ${r.status}">${r.status}</span></td>
                    <td>${renderScoreBar(r.aggregate_score)}</td>
                    <td class="mono">${r.flaw_count ?? '--'}</td>
                    <td class="mono">${r.pipeline_version || '--'}</td>
                    <td class="mono">${r.created_at ? new Date(r.created_at).toLocaleDateString() : '--'}</td>
                </tr>
            `).join('');

            // Flaw chart
            const flawMap = {};
            runs.forEach(r => {
                (r.flaws || []).forEach(f => {
                    flawMap[f] = (flawMap[f] || 0) + 1;
                });
            });
            const sorted = Object.entries(flawMap).sort((a, b) => b[1] - a[1]);
            if (sorted.length) {
                const max = sorted[0][1];
                document.getElementById('flaw-chart').innerHTML = sorted.map(([name, count]) =>
                    `<div class="flaw-bar">
                        <span class="flaw-label">${name}</span>
                        <span class="bar" style="width:${Math.max(count / max * 200, 2)}px"></span>
                        <span class="flaw-count">${count}</span>
                    </div>`
                ).join('');
            }
        }

        function applyFilters() {
            const status = document.getElementById('filter-status').value;
            const version = document.getElementById('filter-version').value;
            const search = document.getElementById('filter-search').value.toLowerCase();
            const filtered = allRuns.filter(r => {
                if (status && r.status !== status) return false;
                if (version && r.pipeline_version !== version) return false;
                if (search && !(r.case_study_id || '').toLowerCase().includes(search)) return false;
                return true;
            });
            renderRuns(filtered);
        }

        document.getElementById('filter-status').addEventListener('change', applyFilters);
        document.getElementById('filter-version').addEventListener('change', applyFilters);
        document.getElementById('filter-search').addEventListener('input', applyFilters);

        async function showDetail(id) {
            const panel = document.getElementById('detail-panel');
            panel.classList.add('open');
            document.getElementById('detail-title').textContent = `Run #${id}`;
            document.getElementById('detail-content').innerHTML = '<div class="empty">Loading...</div>';
            try {
                const run = await fetchJSON(`/api/eval/runs/${id}`);
                const scores = typeof run.scores_json === 'string' ? JSON.parse(run.scores_json) : run.scores_json;
                const flaws = typeof run.flaws_json === 'string' ? JSON.parse(run.flaws_json) : run.flaws_json;
                let html = `
                    <p><strong>Case:</strong> ${run.case_study_id || '--'}</p>
                    <p><strong>Status:</strong> <span class="badge ${run.status}">${run.status}</span></p>
                    <p><strong>Version:</strong> ${run.pipeline_version || '--'}</p>
                    <p><strong>Date:</strong> ${run.created_at ? new Date(run.created_at).toLocaleString() : '--'}</p>
                `;
                if (scores) {
                    html += `<h3 style="margin-top:16px">Scores</h3>`;
                    html += `<pre>${JSON.stringify(scores, null, 2)}</pre>`;
                }
                if (flaws && flaws.length) {
                    html += `<h3 style="margin-top:16px">Flaws (${flaws.length})</h3>`;
                    html += `<ul style="padding-left:16px;font-size:13px">${flaws.map(f => `<li style="margin-bottom:4px">${f}</li>`).join('')}</ul>`;
                }
                document.getElementById('detail-content').innerHTML = html;
            } catch (err) {
                document.getElementById('detail-content').innerHTML = `<div class="empty">${err.message}</div>`;
            }
        }

        function closeDetail() {
            document.getElementById('detail-panel').classList.remove('open');
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

        async function loadCases() {
            try {
                const cases = await fetchJSON('/api/eval/cases');
                if (!cases.length) {
                    document.getElementById('cases-table').innerHTML = '<tr><td colspan="7" class="empty">No case studies imported yet.</td></tr>';
                    return;
                }
                document.getElementById('cases-table').innerHTML = cases.map(c => `
                    <tr>
                        <td class="mono">${c.id}</td>
                        <td>${c.industry || '--'}</td>
                        <td>${c.company_type || '--'}</td>
                        <td class="mono">${c.tier || '--'}</td>
                        <td>${c.agent_type || '--'}</td>
                        <td>${c.holdout ? '<span class="badge holdout">holdout</span>' : ''}</td>
                        <td class="mono">${c.quality_score ?? '--'}</td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('cases-table').innerHTML = `<tr><td colspan="7" class="empty">${err.message}</td></tr>`;
            }
        }

        // Load everything
        Promise.all([loadStats(), loadRuns(), loadCases()]);
    </script>
</body>
</html>
