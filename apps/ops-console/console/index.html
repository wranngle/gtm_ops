    <script>
      (function () {
        var host = (window.location.hostname || '').toLowerCase();
        var isPagesDemo = /\.pages\.dev$/.test(host) || host === 'gtm-ops.pages.dev';
        var isLocalStatic = (host === 'localhost' || host === '127.0.0.1' || host === '::1') &&
          window.location.port !== '3000' &&
          !new URLSearchParams(window.location.search).has('live');
        var DEMO_MODE = (window.location.protocol === 'file:') || window.DEMO_MODE === true || isPagesDemo || isLocalStatic;
        window.DEMO_MODE = DEMO_MODE;
        if (!DEMO_MODE) return;

        var nativeFetch = window.fetch.bind(window);

        function parseFetchUrl(pathOrUrl) {
          try {
            return new URL(String(pathOrUrl), window.location.href);
          } catch (e) {
            return null;
          }
        }

        function shouldUseFixture(pathOrUrl) {
          var parsed = parseFetchUrl(pathOrUrl);
          if (!parsed) return String(pathOrUrl).indexOf('/api') === 0;
          return parsed.origin === window.location.origin && parsed.pathname.indexOf('/api') === 0;
        }

        function pathToFixture(pathOrUrl) {
          var parsed = parseFetchUrl(pathOrUrl);
          var u = parsed ? parsed.pathname : String(pathOrUrl).replace(/^https?:\/\/[^/]+/, '');
          u = u.split('?')[0].split('#')[0];
          if (!u.indexOf('/api')) u = u.slice(4);
          if (!u || u === '/') u = '/index';
          u = u.replace(/\/(?:\d+|[a-z]+_[\w-]+)(\/|$)/gi, '/default$1');
          return '../fixtures' + u + '.json';
        }

        function jsonResponse(payload, status) {
          var body = JSON.stringify(payload);
          return new Response(body, {
            status: status || 200,
            headers: { 'Content-Type': 'application/json' }
          });
        }

        window.fetch = function (input, init) {
          var url = typeof input === 'string' ? input : (input && input.url) || '';
          var method = ((init && init.method) || (input && input.method) || 'GET').toUpperCase();

          if (!shouldUseFixture(url)) {
            return nativeFetch(input, init);
          }

          if (method !== 'GET' && method !== 'HEAD') {
            return Promise.resolve(jsonResponse({
              ok: true, demo: true, method: method, success: true, status: 'completed'
            }));
          }

          var fixturePath = pathToFixture(url);
          return nativeFetch(fixturePath).then(function (r) {
            if (r.ok) return r;
            return jsonResponse([]);
          }).catch(function () {
            return jsonResponse([]);
          });
        };

        if (typeof window.EventSource === 'function') {
          var NativeES = window.EventSource;
          window.EventSource = function (url) {
            if (typeof url === 'string' && url.indexOf('/api') !== -1) {
              return {
                addEventListener: function () {}, removeEventListener: function () {},
                close: function () {}, onmessage: null, onerror: null, onopen: null, readyState: 2
              };
            }
            return new NativeES(url);
          };
        }
      })();
    </script>
