<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eval Runs — voice_ai_agent_evals // Wranngle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" sizes="32x32" href="/favicon.ico?v=3">
    <link rel="icon" type="image/png" href="/favicon.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#12111a">
    <link rel="stylesheet" href="../tokens/tokens.css">

    <!-- DEMO_MODE: file://, *.pages.dev host, or window.DEMO_MODE → fixtures from ../fixtures/ -->
    <script>
      (function () {
        var host = (window.location.hostname || '').toLowerCase();
        var isPagesDemo = /\.pages\.dev$/.test(host);
        var DEMO_MODE = (window.location.protocol === 'file:') || window.DEMO_MODE === true || isPagesDemo;
        window.DEMO_MODE = DEMO_MODE;
        if (!DEMO_MODE) return;
        var nativeFetch = window.fetch.bind(window);
        window.fetch = function (input, init) {
          var url = typeof input === 'string' ? input : (input && input.url) || '';
          var method = ((init && init.method) || 'GET').toUpperCase();
          if (url.indexOf('/api') === -1) return nativeFetch(input, init);
          if (method !== 'GET' && method !== 'HEAD') {
            return Promise.resolve(new Response(JSON.stringify({ ok: true, demo: true }), {
              status: 200, headers: { 'Content-Type': 'application/json' }
            }));
          }
          var u = url.replace(/^https?:\/\/[^/]+/, '').split('?')[0];
          if (!u.indexOf('/api')) u = u.slice(4);
          u = u.replace(/\/(?:\d+|[a-z]+_[\w-]+)(\/|$)/gi, '/default$1');
          return nativeFetch('../fixtures' + u + '.json').then(function (r) {
            if (r.ok) return r;
            return new Response('[]', { status: 200, headers: { 'Content-Type': 'application/json' } });
          }).catch(function () {
            return new Response('[]', { status: 200, headers: { 'Content-Type': 'application/json' } });
          });
        };
      })();
    </script>

    <style>
        :root {
            --violet-500: #cf3c69;
            --sunset-300: #ff9e33; --sunset-500: #ff5f00; --sunset-600: #ef4b00;
            --sand-200: #ebdfc8;
            --night-800: #393444; --night-900: #201e28; --night-950: #12111a;
            --color-healthy: #5D8C61;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--night-950);
            color: #e0dce8;
            min-height: 100vh;
            padding: 24px;
        }
        h1, h2, h3 { font-family: var(--font-display); }
        a { color: var(--sunset-500); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header .nav { display: flex; gap: 16px; font-size: 13px; color: #847d9a; }
        .header .subtitle {
            font-size: 12px; color: #847d9a; margin-top: 4px;
            font-family: var(--font-mono);
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px; margin-bottom: 28px;
        }
        .stat-card {
            background: var(--night-900);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 18px;
        }
        .stat-card .label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
            /* was #847d9a (4.21:1, fails AA on dark bg). Lifted to #aaa4b8
               for ~7:1 — same fix as the React console did in tick 20. */
            color: #aaa4b8; margin-bottom: 8px;
        }
        .visually-hidden {
            position: absolute !important;
            width: 1px; height: 1px; overflow: hidden;
            clip: rect(0 0 0 0); clip-path: inset(50%);
            white-space: nowrap; border: 0; padding: 0; margin: -1px;
        }
        .stat-card .value {
            font-family: var(--font-mono); font-size: 26px; font-weight: 700;
        }
        .stat-card .value.good { color: var(--color-healthy); }
        .stat-card .value.bad { color: var(--violet-500); }
        .stat-card .value.warn { color: #e8a735; }

        .filter-bar {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
            color: #847d9a;
        }
        .filter-bar select, .filter-bar input {
            background: var(--night-800); border: 1px solid rgba(255,255,255,0.1);
            color: #e0dce8; padding: 6px 10px; border-radius: 6px;
            font-size: 12px; font-family: var(--font-body);
        }

        .workspace-grid {
            display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(340px, 0.85fr);
            gap: 18px; align-items: start;
        }
        .runs-list { display: flex; flex-direction: column; gap: 10px; }
        .run-card {
            background: var(--night-900);
            border: 1px solid rgba(255,255,255,0.06);
            border-left: 3px solid transparent;
            border-radius: 10px; padding: 16px 20px;
            display: grid; grid-template-columns: 1fr auto auto auto auto;
            gap: 16px; align-items: center;
        }
        .run-card.pass { border-left-color: var(--color-healthy); }
        .run-card.fail { border-left-color: var(--violet-500); }
        .run-card.active { outline: 1px solid var(--sunset-500); background: rgba(255,95,0,0.06); }

        .run-card .scenario {
            font-family: var(--font-mono); font-size: 13px; font-weight: 500;
            color: #e0dce8;
        }
        .run-card .meta {
            font-size: 11px; color: #847d9a; margin-top: 4px;
            font-family: var(--font-mono);
        }
        .run-card .meta .sep { color: rgba(255,255,255,0.18); margin: 0 8px; }

        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 9999px;
            font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge.pass { background: rgba(93,140,97,0.18); color: var(--color-healthy); }
        .badge.fail { background: rgba(207,60,105,0.18); color: var(--violet-500); }

        .score-cell {
            font-family: var(--font-mono); font-size: 13px;
            min-width: 80px; text-align: right;
        }
        .score-bar {
            display: block; height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.06); width: 80px;
            margin-top: 4px; overflow: hidden;
        }
        .score-bar .fill { height: 100%; border-radius: 2px; }

        .timestamp { font-family: var(--font-mono); font-size: 11px; color: #847d9a; }
        .link-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.1);
            color: var(--sunset-500); padding: 4px 10px; border-radius: 6px;
            font-size: 11px; font-family: var(--font-mono); cursor: pointer;
            text-decoration: none;
        }
        .link-btn:hover {
            border-color: var(--sunset-500); text-decoration: none;
            background: rgba(255,95,0,0.08);
        }

        .empty {
            color: #847d9a; font-style: italic; padding: 32px;
            text-align: center;
        }

        .demo-banner {
            display: none;
            background: rgba(255,95,0,0.08);
            border: 1px solid rgba(255,95,0,0.3);
            color: var(--sunset-300);
            padding: 8px 14px; border-radius: 8px; margin-bottom: 16px;
            font-size: 12px; font-family: var(--font-mono);
        }
        body.demo .demo-banner { display: block; }

        .detail-card {
            background: var(--night-900);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            position: sticky; top: 16px;
            overflow: hidden;
        }
        .detail-card__hd {
            padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .detail-card__title { font-size: 15px; font-weight: 700; }
        .detail-card__body { padding: 18px; display: flex; flex-direction: column; gap: 16px; }
        .detail-meta {
            display: flex; gap: 8px; flex-wrap: wrap;
            font-family: var(--font-mono); font-size: 11px; color: #aaa4b8;
        }
        .detail-pill {
            border: 1px solid rgba(255,255,255,0.10); background: var(--night-800);
            border-radius: 999px; padding: 3px 8px;
        }
        .axis-list { display: flex; flex-direction: column; gap: 8px; }
        .axis-row {
            display: grid; grid-template-columns: 1fr auto 34px; gap: 10px; align-items: center;
            padding: 10px 12px; background: var(--night-950);
            border: 1px solid rgba(255,255,255,0.06); border-left: 3px solid var(--color-healthy);
            border-radius: 8px;
        }
        .axis-row.fail { border-left-color: var(--violet-500); background: rgba(207,60,105,0.08); }
        .axis-name { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: #e0dce8; }
        .axis-detail { margin-top: 4px; font-size: 12px; line-height: 1.45; color: #b5afc4; }
        .el-panel {
            border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
            background: var(--night-950); padding: 14px;
        }
        .el-panel__head {
            display: grid; grid-template-columns: 48px 1fr; gap: 12px; align-items: center; margin-bottom: 14px;
        }
        .el-orb {
            width: 48px; height: 48px; border-radius: 50%;
            background:
                radial-gradient(circle at 34% 28%, rgba(255,255,255,0.75), transparent 18%),
                linear-gradient(145deg, #F97316, #8B5CF6);
            box-shadow: 0 12px 26px rgba(0,0,0,.28);
        }
        .waveform { display: flex; align-items: center; gap: 4px; height: 42px; }
        .waveform span { flex: 1; max-width: 16px; border-radius: 99px; background: var(--color-healthy); opacity: .86; }
        .waveform span.fail { background: var(--violet-500); }
        .evidence-stream { display: flex; flex-direction: column; gap: 8px; }
        .evidence-msg {
            border: 1px solid rgba(255,255,255,0.08); border-left: 3px solid var(--sunset-500);
            background: var(--night-950); border-radius: 8px; padding: 10px 12px;
        }
        .evidence-msg .who {
            display: block; margin-bottom: 5px;
            font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
            color: #aaa4b8;
        }
        .evidence-msg p { margin: 0; font-size: 12px; line-height: 1.5; color: #d8d2e8; }
        @media (max-width: 980px) {
            .workspace-grid { grid-template-columns: 1fr; }
            .detail-card { position: static; }
            .run-card { grid-template-columns: 1fr auto; }
            .timestamp, .score-cell { text-align: left; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div>
            <h1>Eval Runs</h1>
            <div class="subtitle">voice_ai_agent_evals — harness output surface</div>
        </div>
        <nav class="nav" aria-label="Cross-app navigation">
            <a href="../console/">&#8592; Console</a>
            <a href="../console/?route=evals">Console Evals</a>
        </nav>
    </header>

    <main>

    <div class="demo-banner" role="status">DEMO_MODE — fixtures served from ./fixtures/eval-runs.json</div>

    <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="label">Total Runs</div><div class="value" id="stat-total">--</div></div>
        <div class="stat-card"><div class="label">Pass</div><div class="value good" id="stat-pass">--</div></div>
        <div class="stat-card"><div class="label">Fail</div><div class="value bad" id="stat-fail">--</div></div>
        <div class="stat-card"><div class="label">Pass Rate</div><div class="value" id="stat-rate">--</div></div>
        <div class="stat-card"><div class="label">Mean Score</div><div class="value" id="stat-mean">--</div></div>
    </div>

    <div class="filter-bar">
        <label for="filter-verdict">Verdict:</label>
        <select id="filter-verdict">
            <option value="all">All</option>
            <option value="pass">Pass</option>
            <option value="fail">Fail</option>
        </select>
        <label for="filter-search">Search:</label>
        <input type="search" id="filter-search" placeholder="scenario / agent / prompt tag">
    </div>

    <div class="workspace-grid">
        <div class="runs-list" id="runs-list" aria-label="Evaluation run list">
            <div class="empty">Loading...</div>
        </div>

        <aside class="detail-card" id="run-detail" aria-live="polite">
            <div class="detail-card__hd">
                <h2 class="detail-card__title" id="detail-title">Run detail</h2>
                <span class="badge" id="detail-verdict">ready</span>
            </div>
            <div class="detail-card__body">
                <div class="detail-meta" id="detail-meta">
                    <span class="detail-pill">Select a run</span>
                </div>
                <section aria-labelledby="axes-heading">
                    <h3 id="axes-heading" class="visually-hidden">Score axes</h3>
                    <div class="axis-list" id="detail-axes"></div>
                </section>
                <section class="el-panel" aria-label="ElevenLabs agent context">
                    <div class="el-panel__head">
                        <div class="el-orb" aria-hidden="true"></div>
                        <div>
                            <div style="font-weight:700;font-size:14px">ElevenLabs eval context</div>
                            <div class="mono" id="detail-agent" style="font-size:11px;color:#aaa4b8;margin-top:3px">agent pending</div>
                        </div>
                    </div>
                    <div class="waveform" id="detail-waveform" aria-hidden="true"></div>
                </section>
                <section class="evidence-stream" id="detail-evidence" aria-label="Evaluation evidence stream"></section>
            </div>
        </aside>
    </div>

    <script>
        if (window.DEMO_MODE) document.body.classList.add('demo');

        let allRuns = [];
        let activeScenario = null;

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        function agentLabel(agentId) {
            if (!agentId) return 'No agent id';
            if (agentId === 'agent_xxxx_demo') return 'Sales Coach demo agent';
            if (agentId === 'agent_yyyy_demo') return 'Sarah Intake demo agent';
            return agentId;
        }

        function fmtScore(n) {
            if (n == null || isNaN(n)) return '--';
            return Math.round(n * 100) + '%';
        }

        function fmtDate(s) {
            if (!s) return '--';
            try { return new Date(s).toLocaleString(); }
            catch (e) { return s; }
        }

        function scoreColor(score) {
            if (score == null) return '#847d9a';
            if (score >= 0.7) return 'var(--color-healthy)';
            if (score >= 0.4) return '#e8a735';
            return 'var(--violet-500)';
        }

        function renderStats(runs) {
            const total = runs.length;
            const pass = runs.filter(r => r.verdict === 'pass').length;
            const fail = total - pass;
            const rate = total ? (pass / total) : 0;
            const scored = runs.map(r => (r.score && typeof r.score.weighted === 'number') ? r.score.weighted : null).filter(v => v != null);
            const mean = scored.length ? scored.reduce((a, b) => a + b, 0) / scored.length : null;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-pass').textContent = pass;
            document.getElementById('stat-fail').textContent = fail;
            document.getElementById('stat-rate').textContent = total ? Math.round(rate * 100) + '%' : '--';
            document.getElementById('stat-mean').textContent = fmtScore(mean);
        }

        function renderRuns(runs) {
            const list = document.getElementById('runs-list');
            if (!runs.length) {
                list.innerHTML = '<div class="empty">No eval runs match the current filter.</div>';
                renderDetail(null);
                return;
            }
            if (!activeScenario || !runs.some(r => r.scenario_id === activeScenario)) {
                const firstFail = runs.find(r => (r.verdict || '').toLowerCase() === 'fail');
                activeScenario = (firstFail || runs[0]).scenario_id;
            }
            list.innerHTML = runs.map(r => {
                const score = (r.score && typeof r.score.weighted === 'number') ? r.score.weighted : null;
                const pct = score == null ? 0 : Math.round(score * 100);
                const color = scoreColor(score);
                const verdict = (r.verdict || 'unknown').toLowerCase();
                const cardClass = verdict === 'pass' ? 'pass' : (verdict === 'fail' ? 'fail' : '');
                const resultPath = r.result_path || (r.scenario_id ? `../fixtures/runs/${r.scenario_id}.json` : '#');
                return `
                    <div class="run-card ${cardClass} ${r.scenario_id === activeScenario ? 'active' : ''}" role="button" tabindex="0" data-scenario="${escapeHtml(r.scenario_id)}" aria-pressed="${r.scenario_id === activeScenario}">
                        <div>
                            <div class="scenario">${escapeHtml(r.scenario_id || '(unnamed)')}</div>
                            <div class="meta">
                                <span>${escapeHtml(r.agent_id || '--')}</span>
                                <span class="sep">·</span>
                                <span>${escapeHtml(r.prompt_tag || '--')}</span>
                                ${r.harness_version ? `<span class="sep">·</span><span>harness ${escapeHtml(r.harness_version)}</span>` : ''}
                            </div>
                        </div>
                        <span class="badge ${verdict}">${escapeHtml(verdict)}</span>
                        <div class="score-cell">
                            <div>${fmtScore(score)}</div>
                            <span class="score-bar"><span class="fill" style="width:${pct}%;background:${color};display:block;height:100%"></span></span>
                        </div>
                        <span class="timestamp">${fmtDate(r.started_at)}</span>
                        <a class="link-btn" href="${escapeHtml(resultPath)}" target="_blank" rel="noopener">result.json</a>
                    </div>
                `;
            }).join('');
            list.querySelectorAll('.run-card').forEach(card => {
                const select = () => {
                    activeScenario = card.getAttribute('data-scenario');
                    renderRuns(allRuns.filter(currentFilter));
                };
                card.addEventListener('click', (event) => {
                    if (event.target.closest('a')) return;
                    select();
                });
                card.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        select();
                    }
                });
            });
            renderDetail(allRuns.find(r => r.scenario_id === activeScenario) || runs[0]);
        }

        function currentFilter(r) {
            const verdict = document.getElementById('filter-verdict').value;
            const search = document.getElementById('filter-search').value.toLowerCase().trim();
            if (verdict !== 'all' && (r.verdict || '').toLowerCase() !== verdict) return false;
            if (search) {
                const hay = [r.scenario_id, r.agent_id, r.prompt_tag].filter(Boolean).join(' ').toLowerCase();
                if (hay.indexOf(search) === -1) return false;
            }
            return true;
        }

        function renderDetail(run) {
            document.getElementById('detail-title').textContent = run ? run.scenario_id : 'Run detail';
            document.getElementById('detail-verdict').textContent = run ? (run.verdict || 'unknown') : 'ready';
            document.getElementById('detail-verdict').className = `badge ${run && run.verdict === 'pass' ? 'pass' : run && run.verdict === 'fail' ? 'fail' : ''}`;
            if (!run) {
                document.getElementById('detail-meta').innerHTML = '<span class="detail-pill">Select a run</span>';
                document.getElementById('detail-axes').innerHTML = '<div class="empty">No run selected.</div>';
                document.getElementById('detail-agent').textContent = 'agent pending';
                document.getElementById('detail-waveform').innerHTML = '';
                document.getElementById('detail-evidence').innerHTML = '';
                return;
            }
            const score = run.score && typeof run.score.weighted === 'number' ? run.score.weighted : null;
            const axes = (run.score && Array.isArray(run.score.axes)) ? run.score.axes : [];
            const failed = axes.filter(a => a.pass === false);
            document.getElementById('detail-meta').innerHTML = `
                <span class="detail-pill">${escapeHtml(agentLabel(run.agent_id))}</span>
                <span class="detail-pill">${escapeHtml(run.prompt_tag || '--')}</span>
                <span class="detail-pill">${escapeHtml(run.harness_version || '--')}</span>
                <span class="detail-pill">${fmtScore(score)}</span>
                <span class="detail-pill">${fmtDate(run.started_at)}</span>
            `;
            document.getElementById('detail-axes').innerHTML = axes.length ? axes.map(axis => `
                <div class="axis-row ${axis.pass ? '' : 'fail'}">
                    <div>
                        <div class="axis-name">${escapeHtml(axis.name)}</div>
                        <div class="axis-detail">${escapeHtml(axis.detail || '')}</div>
                    </div>
                    <span class="badge ${axis.pass ? 'pass' : 'fail'}">${axis.pass ? 'pass' : 'fail'}</span>
                    <span class="mono" style="font-size:11px;color:#aaa4b8">${escapeHtml(axis.weight ?? 1)}x</span>
                </div>
            `).join('') : '<div class="empty">This result emitted only an aggregate score.</div>';
            document.getElementById('detail-agent').textContent = `${agentLabel(run.agent_id)} · ${run.agent_id || '--'}`;
            document.getElementById('detail-waveform').innerHTML = (axes.length ? axes : Array.from({ length: 10 }, (_, i) => ({ pass: i % 3 !== 0, weight: i + 1 }))).slice(0, 14).map((axis, i) => {
                const h = 16 + (((Number(axis.weight) || i + 1) * 9) % 28);
                return `<span class="${axis.pass === false ? 'fail' : ''}" style="height:${h}px"></span>`;
            }).join('');
            document.getElementById('detail-evidence').innerHTML = `
                <div class="evidence-msg"><span class="who">scenario</span><p>${escapeHtml(run.scenario_id)}</p></div>
                <div class="evidence-msg"><span class="who">harness</span><p>${escapeHtml(run.prompt_tag || 'prompt/latest')} scored ${axes.length || 'aggregate'} axis group${axes.length === 1 ? '' : 's'}.</p></div>
                <div class="evidence-msg"><span class="who">judge</span><p>${escapeHtml(failed.length ? failed.map(a => `${a.name}: ${a.detail}`).join(' · ') : 'No failing axes; preserve this baseline while watching latency and tool-routing drift.')}</p></div>
            `;
        }

        function applyFilters() {
            const filtered = allRuns.filter(currentFilter);
            renderRuns(filtered);
        }

        async function load() {
            try {
                const resp = await fetch('/api/eval-runs');
                const data = await resp.json();
                allRuns = Array.isArray(data) ? data : (data.runs || []);
                allRuns.sort((a, b) => {
                    const ta = a.started_at ? new Date(a.started_at).getTime() : 0;
                    const tb = b.started_at ? new Date(b.started_at).getTime() : 0;
                    return tb - ta;
                });
                renderStats(allRuns);
                renderRuns(allRuns);
            } catch (e) {
                document.getElementById('runs-list').innerHTML =
                    `<div class="empty">Error loading runs: ${e.message}</div>`;
            }
        }

        document.getElementById('filter-verdict').addEventListener('change', applyFilters);
        document.getElementById('filter-search').addEventListener('input', applyFilters);
        load();
    </script>

    </main>
</body>
</html>
