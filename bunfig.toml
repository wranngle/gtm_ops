# Bun Configuration for TypeScript Projects
# See: https://bun.sh/docs/runtime/bunfig

[install]
# Use exact versions for reproducibility
exact = true

[install.lockfile]
# Save lockfile in binary format (faster)
save = true

# No [test] block on purpose: tests run under vitest (bun run test:run), not
# `bun test` — a config for bun's native runner would be dead weight.
